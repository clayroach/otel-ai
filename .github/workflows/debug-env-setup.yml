name: Debug Environment Setup

on:
  push:
    branches: [debug/env-file-ci-investigation]
  pull_request:
    branches: [debug/env-file-ci-investigation]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.15.0'

jobs:
  debug-env-setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Setup environment variables
        run: |
          # Debug: Show working directory and files
          echo "🔍 Current working directory: $(pwd)"
          echo "📁 Files in current directory:"
          ls -la
          
          # Copy GitHub CI environment file
          cp .env.github .env
          
          # Debug: Verify .env file was created and show its content
          echo "✅ .env file created, checking contents:"
          echo "📄 .env file exists: $(test -f .env && echo 'YES' || echo 'NO')"
          if [ -f .env ]; then
            echo "📊 .env file size: $(wc -l .env)"
            echo "🔍 LLM model variables in .env:"
            grep "LLM_.*MODEL" .env || echo "❌ No LLM model variables found"
          fi
          
          # Override sensitive values from GitHub secrets
          if [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then
            sed -i "s/OPENAI_API_KEY=placeholder_will_be_replaced_by_github_secret/OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}/g" .env
          fi
          
          if [ -n "${{ secrets.CLAUDE_API_KEY }}" ]; then
            sed -i "s/CLAUDE_API_KEY=placeholder_will_be_replaced_by_github_secret/CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}/g" .env
          fi
          
          # Final verification
          echo "🎯 Final .env verification:"
          echo "📄 .env file exists: $(test -f .env && echo 'YES' || echo 'NO')"
          echo "📊 Total lines in .env: $(wc -l .env 2>/dev/null || echo '0')"
          
          # Debug: Show first 15 lines of .env
          echo "📄 First 15 lines of .env file:"
          head -15 .env 2>/dev/null || echo "❌ Could not read .env file"
          
          # Debug: Check specific LLM variables
          echo "🔍 Checking specific LLM variables:"
          echo "LLM_SQL_MODEL_1=$(grep '^LLM_SQL_MODEL_1=' .env 2>/dev/null || echo 'NOT FOUND')"
          echo "LLM_GENERAL_MODEL_1=$(grep '^LLM_GENERAL_MODEL_1=' .env 2>/dev/null || echo 'NOT FOUND')"
          
      - name: Test environment variable loading
        run: |
          echo "🧪 Testing environment variable loading like tests do..."
          
          # Simulate what our test-setup.ts does
          echo "📍 Current working directory: $(pwd)"
          
          # Check all possible paths
          echo "🔍 Checking possible .env paths:"
          echo "1. Current directory: $(test -f .env && echo 'FOUND' || echo 'NOT FOUND') - ./.env"
          echo "2. Parent directory: $(test -f ../.env && echo 'FOUND' || echo 'NOT FOUND') - ../.env" 
          echo "3. Grandparent directory: $(test -f ../../.env && echo 'FOUND' || echo 'NOT FOUND') - ../../.env"
          
          # Show directory structure for debugging
          echo "📁 Directory structure:"
          echo "Current directory ($(pwd)):"
          ls -la . | head -10
          echo "Parent directory ($(dirname $(pwd))):"
          ls -la .. | head -10
          echo "Grandparent directory ($(dirname $(dirname $(pwd)))):"
          ls -la ../.. | head -10
          
      - name: Run a simple integration test simulation
        run: |
          echo "🧪 Simulating integration test environment..."
          node -e "
          const { existsSync, readFileSync } = require('fs');
          const { join } = require('path');
          
          console.log('🔍 Current working directory:', process.cwd());
          
          const possiblePaths = [
            join(process.cwd(), '.env'),
            join(process.cwd(), '..', '.env'), 
            join(process.cwd(), '../..', '.env')
          ];
          
          let foundPath = null;
          possiblePaths.forEach(path => {
            const exists = existsSync(path);
            console.log(\`\${exists ? '✅' : '❌'} \${path}: \${exists ? 'FOUND' : 'NOT FOUND'}\`);
            if (exists && !foundPath) {
              foundPath = path;
            }
          });
          
          if (foundPath) {
            console.log('🎯 Using .env file from:', foundPath);
            const content = readFileSync(foundPath, 'utf-8');
            const llmLines = content.split('\n').filter(line => line.startsWith('LLM_') && line.includes('MODEL'));
            console.log('🔍 LLM model variables found:', llmLines.length);
            llmLines.forEach(line => console.log('  -', line));
          } else {
            console.log('❌ No .env file found in any location');
          }
          "